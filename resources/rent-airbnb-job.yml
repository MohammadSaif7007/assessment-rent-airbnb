resources:
  jobs:
    assessment-rent-airbnb:
      name: assessment-rent-airbnb

      schedule:
        quartz_cron_expression: "0 0 6 ? * MON"
        timezone_id: Europe/Amsterdam

      email_notifications:
        on_failure:
          - mdsaif091994@gmail.com

      tasks:
        - task_key: bronze_ingestion
          notebook_task:
            notebook_path: ../notebooks/pipelines/rent-airbnb/01_bronze_ingestion.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              data_path: ${var.data_path}
          environment_key: default

        - task_key: silver_cleaning
          depends_on:
            - task_key: bronze_ingestion
          notebook_task:
            notebook_path: ../notebooks/pipelines/rent-airbnb/02_silver_cleaning.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              data_path: ${var.data_path}
          environment_key: default

        - task_key: gold_revenue
          depends_on:
            - task_key: silver_cleaning
          notebook_task:
            notebook_path: ../notebooks/pipelines/rent-airbnb/03_gold_revenue.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
          environment_key: default

      environments:
        - environment_key: default
          spec:
            client: "2"
            dependencies:
              - shapely>=2.0.0